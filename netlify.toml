[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.hotjar.com https://*.hotjar.io wss://*.hotjar.com https://www.googletagmanager.com https://*.google-analytics.com https://*.googleadservices.com https://*.googlesyndication.com https://*.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://*.hotjar.com; img-src 'self' data: https://*.hotjar.com https://*.google-analytics.com https://*.googleadservices.com https://*.googlesyndication.com https://*.g.doubleclick.net; font-src 'self' data: https://*.hotjar.com; connect-src 'self' https://*.hotjar.com wss://*.hotjar.com https://*.google-analytics.com https://*.googleadservices.com https://*.g.doubleclick.net; frame-src https://*.hotjar.com https://*.doubleclick.net https://*.googlesyndication.com https://web.whatsapp.com"
